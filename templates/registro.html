<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Barbería</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background-color: #1e1e1e; padding: 30px; border-radius: 15px; border: 2px solid #d4af37; text-align: center; width: 350px; }
        h1 { color: #d4af37; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #2b2b2b; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #d4af37; border: none; border-radius: 5px; color: black; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>💈 Club de Sellos</h1>
        <p>Regístrate para ganar premios</p>
        <form action="/registrar" method="POST">
            <input type="text" name="nombre" placeholder="Nombre completo" required>
            <input type="tel" name="telefono" placeholder="Número de teléfono" required>
            <button type="submit">OBTENER MI PRIMER SELLO</button>
        </form>
    </div>
</body>
</html>
