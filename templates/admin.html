<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - Barbería</title>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; padding: 40px; }
        h1 { color: #d4af37; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e1e1e; }
        th, td { border: 1px solid #d4af37; padding: 15px; text-align: left; }
        th { background-color: #d4af37; color: black; }
        .boton { 
            background-color: #d4af37; 
            color: black; 
            padding: 8px 15px; 
            text-decoration: none; 
            font-weight: bold; 
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Panel de Administración 💈</h1>
    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Sellos Acumulados</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            {% for c in clientes %}
            <tr>
                <td>{{ c.nombre }}</td>
                <td>{{ c.telefono }}</td>
                <td>⭐ {{ c.sellos }}</td>
                <td>
    <td>
    <a href="/sumar_sello/{{ c.id }}" class="boton">+ Agregar</a>
    <a href="/restar_sello/{{ c.id }}" class="boton" style="background-color: #e74c3c; margin-left: 10px;">- Quitar</a>
    <a href="/canjear_premio/{{ c.id }}" class="boton" style="background-color: #27ae60; margin-left: 10px;">🎁 Entregar Especial</a>
</td>
</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <br>
    <a href="/" style="color: #d4af37;">← Volver al Registro</a>
</body>
</html>
